<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Dearnes · Etiquetas Térmicas PT</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f0f0; }

.panel {
  background: #1A3A6B; color: #fff; padding: 12px 20px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px;
}
.panel-title { font-size: 14px; font-weight: 700; }
.panel-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; font-family: Arial; }
.btn-white { background: #fff; color: #1A3A6B; }
.btn-ghost { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
.copies-row { display: flex; align-items: center; gap: 6px; font-size: 12px; }
.copies-row input { width: 48px; padding: 5px 6px; border-radius: 5px; border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; font-size: 12px; text-align: center; }

.grid {
  padding: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* ETIQUETA 4x6 cm a 96dpi ≈ 151x227px, usamos proporciones reales */
.label {
  width: 151px;
  height: 227px;
  background: #fff;
  border: 1px solid #ccc;
  border-radius: 4px;
  overflow: hidden;
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
}
.label.sel { border: 2px solid #1A3A6B; box-shadow: 0 0 0 2px rgba(26,58,107,.2); }
.label.sel .chk { display: flex; }
.chk { display: none; position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: #1A3A6B; color: #fff; border-radius: 50%; font-size: 10px; align-items: center; justify-content: center; font-weight: 700; z-index: 2; }

/* Header */
.lbl-top {
  background: #1A3A6B;
  color: #fff;
  padding: 4px 6px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.lbl-empresa { font-size: 7px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; opacity: .8; }
.lbl-tipo { font-size: 7px; opacity: .65; text-transform: uppercase; }

/* Código grande */
.lbl-codigo {
  font-size: 13px;
  font-weight: 700;
  font-family: 'Courier New', monospace;
  text-align: center;
  padding: 3px 6px 0;
  letter-spacing: .02em;
  flex-shrink: 0;
}

/* Descripción */
.lbl-desc {
  font-size: 9px;
  font-weight: 600;
  text-align: center;
  padding: 1px 6px 3px;
  color: #333;
  line-height: 1.2;
  flex-shrink: 0;
}

/* QR */
.lbl-qr {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 2px;
}
.lbl-qr svg { display: block; }
.lbl-qr-txt { font-size: 7px; color: #999; font-family: 'Courier New', monospace; margin-top: 1px; }

/* Footer */
.lbl-foot {
  background: #f5f5f5;
  border-top: 1px solid #e0e0e0;
  padding: 3px 6px;
  display: flex;
  justify-content: space-between;
  font-size: 7px;
  color: #666;
  flex-shrink: 0;
}
.lbl-lote { font-family: 'Courier New', monospace; }

/* PRINT */
@media print {
  body { background: #fff; }
  .panel { display: none !important; }
  .grid { padding: 0; gap: 0; }
  .label {
    display: none;
    /* Tamaño real: 4cm x 6cm */
    width: 4cm;
    height: 6cm;
    border: none;
    border-radius: 0;
    box-shadow: none;
    page-break-inside: avoid;
    break-inside: avoid;
  }
  .label.sel, .label.pcopy { display: flex; }
  .chk { display: none !important; }
  .lbl-codigo { font-size: 12pt; }
  .lbl-desc { font-size: 7pt; }
}
</style>
</head>
<body>

<div class="panel">
  <div>
    <div class="panel-title">🖨️ Grupo Dearnes · Etiquetas Térmicas 4×6 cm</div>
  </div>
  <div class="panel-actions">
    <div class="copies-row">
      <span>Copias:</span>
      <input type="number" id="copies" value="1" min="1" max="100"/>
    </div>
    <button class="btn btn-ghost" id="btn-all" onclick="toggleAll()">☐ Seleccionar todo</button>
    <button class="btn btn-white" onclick="imprimir()">🖨️ Imprimir</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const productos = [
  {ProdID:'PROD-001',Codigo:'P-10-3.5',  Descripcion:'Rollo 10m² / 3.5kg', Unidad:'rollo'  },
  {ProdID:'PROD-002',Codigo:'P-3-1.1',   Descripcion:'Rollo 3m² / 1.1kg',  Unidad:'rollo'  },
  {ProdID:'PROD-003',Codigo:'P-10-3.0',  Descripcion:'Rollo 10m² / 3.0kg', Unidad:'rollo'  },
  {ProdID:'PROD-004',Codigo:'P-05-1.8',  Descripcion:'Rollo 5m² / 1.8kg',  Unidad:'rollo'  },
  {ProdID:'PROD-005',Codigo:'P-20-7.2',  Descripcion:'Rollo 20m² / 7.2kg', Unidad:'rollo'  },
  {ProdID:'PROD-006',Codigo:'P-6.5-2.4', Descripcion:'Rollo 6.5m² / 2.4kg',Unidad:'rollo'  },
  {ProdID:'PROD-007',Codigo:'CU-4.0-L',  Descripcion:'Cubeta 4L Helado',   Unidad:'cubeta' },
  {ProdID:'PROD-008',Codigo:'CU-4.0-ECOM',Descripcion:'Cubeta 4L ECOM',    Unidad:'cubeta' },
  {ProdID:'PROD-009',Codigo:'EST-ABG',   Descripcion:'Estuche AGRANDE',    Unidad:'estuche'},
  {ProdID:'PROD-010',Codigo:'EST-ABM',   Descripcion:'Estuche AMEDIANO',   Unidad:'estuche'},
  {ProdID:'PROD-011',Codigo:'EST-IBE',   Descripcion:'Estuche Iberia',     Unidad:'estuche'},
  {ProdID:'PROD-012',Codigo:'BUJE',      Descripcion:'Buje',               Unidad:'pieza'  },
  {ProdID:'PROD-013',Codigo:'BR-16-CAV', Descripcion:'Broche de Sujeción', Unidad:'pieza'  },
];

const today = () => new Date().toISOString().split('T')[0];
const lote = () => 'L-' + today().replace(/-/g,'');
let allSel = false;

// QR SVG embebido
function qrSVG(text, size) {
  try {
    var M = buildQR(text);
    var n = M.length;
    var cell = Math.floor(size / (n + 4));
    var pad = Math.floor((size - n*cell)/2);
    var s = '<svg width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg">';
    s += '<rect width="'+size+'" height="'+size+'" fill="#fff"/>';
    for(var r=0;r<n;r++) for(var c=0;c<n;c++) if(M[r][c]) s+='<rect x="'+(pad+c*cell)+'" y="'+(pad+r*cell)+'" width="'+cell+'" height="'+cell+'" fill="#000"/>';
    s += '</svg>';
    return s;
  } catch(e) {
    return '<svg width="'+size+'" height="'+size+'" xmlns="http://www.w3.org/2000/svg"><rect width="'+size+'" height="'+size+'" fill="#eee"/><text x="50%" y="50%" text-anchor="middle" font-size="8" fill="#999">'+text+'</text></svg>';
  }
}

function buildQR(data) {
  var N=29; var M=[];
  for(var i=0;i<N;i++){M[i]=[];for(var j=0;j<N;j++)M[i][j]=null;}
  function pat(r,c){for(var dr=-1;dr<=7;dr++)for(var dc=-1;dc<=7;dc++){if(r+dr<0||r+dr>=N||c+dc<0||c+dc>=N)continue;M[r+dr][c+dc]=(dr>=0&&dr<=6&&(dc==0||dc==6))||(dc>=0&&dc<=6&&(dr==0||dr==6))||(dr>=2&&dr<=4&&dc>=2&&dc<=4);}}
  pat(0,0);pat(N-7,0);pat(0,N-7);
  for(var i=8;i<N-8;i++){if(M[i][6]===null)M[i][6]=(i%2===0);if(M[6][i]===null)M[6][i]=(i%2===0);}
  [[22,22]].forEach(function(p){for(var dr=-2;dr<=2;dr++)for(var dc=-2;dc<=2;dc++)M[p[0]+dr][p[1]+dc]=(dr===-2||dr===2||dc===-2||dc===2||(dr===0&&dc===0));});
  var EXP=new Array(512),LOG=new Array(256);
  for(var i=0;i<8;i++)EXP[i]=1<<i;
  for(var i=8;i<256;i++)EXP[i]=EXP[i-4]^EXP[i-5]^EXP[i-6]^EXP[i-8];
  for(var i=0;i<255;i++){EXP[i+255]=EXP[i];LOG[EXP[i]]=i;}
  function gm(a,b){return a&&b?EXP[LOG[a]+LOG[b]]:0;}
  var EC_POLY=[1];
  for(var i=0;i<22;i++){var t=[1,EXP[i]];var r=new Array(EC_POLY.length+1).fill(0);for(var a=0;a<EC_POLY.length;a++)for(var b=0;b<t.length;b++)r[a+b]^=gm(EC_POLY[a],t[b]);EC_POLY=r;}
  var bytes=[];for(var i=0;i<data.length;i++)bytes.push(data.charCodeAt(i));
  var buf=[],blen=0;
  function putBits(v,l){for(var i=l-1;i>=0;i--){if(!buf[blen>>3])buf[blen>>3]=0;if((v>>i)&1)buf[blen>>3]|=(0x80>>(blen%8));blen++;}}
  var DC=44;
  putBits(4,4);putBits(bytes.length,8);
  for(var i=0;i<bytes.length;i++)putBits(bytes[i],8);
  if(blen<DC*8)putBits(0,4);
  while(blen%8)putBits(0,1);
  while(blen<DC*8){putBits(0xEC,8);if(blen<DC*8)putBits(0x11,8);}
  var msg=buf.slice(0,DC);var gen=EC_POLY;var res=msg.slice();
  for(var i=0;i<DC;i++){var coef=res.shift()||0;res.push(0);if(coef)for(var j=0;j<gen.length;j++)res[j]^=gm(gen[j],coef);}
  var allData=msg.concat(res.slice(0,22));
  var G15=0x537,G15M=0x5412;
  function bchFmt(d){var r=d<<10;function nb(n){var c=0;while(n){c++;n>>>=1;}return c;}while(nb(r)-nb(G15)>=0)r^=G15<<(nb(r)-nb(G15));return(d<<10|r)^G15M;}
  var fmt=bchFmt(0);
  for(var i=0;i<6;i++){M[i][8]=!!((fmt>>i)&1);M[8][N-1-i]=!!((fmt>>i)&1);}
  M[7][8]=!!((fmt>>6)&1);M[8][8]=!!((fmt>>7)&1);M[8][7]=!!((fmt>>8)&1);
  for(var i=9;i<15;i++){M[8][14-i]=!!((fmt>>i)&1);M[N-15+i][8]=!!((fmt>>i)&1);}
  M[N-8][8]=true;
  var idx=0,inc=-1,row=N-1;
  for(var col=N-1;col>0;col-=2){
    if(col===6)col--;
    while(true){
      for(var c=0;c<2;c++){var cc=col-c;if(M[row][cc]===null){var dark=idx<allData.length*8?!!((allData[idx>>3]>>(7-idx%8))&1):false;if((row+cc)%2===0)dark=!dark;M[row][cc]=dark;idx++;}}
      row+=inc;if(row<0||row>=N){row-=inc;inc=-inc;break;}
    }
  }
  return M;
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = productos.map((p, i) => `
    <div class="label" id="c${i}" onclick="tog(${i},event)">
      <div class="chk">✓</div>
      <div class="lbl-top">
        <div class="lbl-empresa">Grupo Dearnes</div>
        <div class="lbl-tipo">${p.Unidad}</div>
      </div>
      <div class="lbl-codigo">${p.Codigo}</div>
      <div class="lbl-desc">${p.Descripcion}</div>
      <div class="lbl-qr">
        ${qrSVG(p.ProdID, 80)}
        <div class="lbl-qr-txt">${p.ProdID}</div>
      </div>
      <div class="lbl-foot">
        <span class="lbl-lote" id="lote${i}">${lote()}</span>
        <span>${today()}</span>
      </div>
    </div>`).join('');
}

function tog(i, e) {
  if(e && e.target.tagName==='INPUT') return;
  document.getElementById('c'+i).classList.toggle('sel');
}
function toggleAll() {
  allSel = !allSel;
  document.querySelectorAll('.label').forEach(c=>c.classList.toggle('sel',allSel));
  document.getElementById('btn-all').textContent = allSel ? '☑ Deseleccionar todo' : '☐ Seleccionar todo';
}
function imprimir() {
  const sel = document.querySelectorAll('.label.sel');
  if(!sel.length){ alert('Selecciona al menos una etiqueta.'); return; }
  const copies = parseInt(document.getElementById('copies').value)||1;
  const g = document.getElementById('grid');
  const clones = [];
  sel.forEach(card => {
    for(let c=1; c<copies; c++){
      const cl = card.cloneNode(true);
      cl.classList.remove('sel');
      cl.classList.add('pcopy');
      cl.id = '';
      g.appendChild(cl);
      clones.push(cl);
    }
  });
  window.print();
  setTimeout(()=>clones.forEach(c=>c.remove()), 1500);
}
render();
</script>
</body>
</html>
