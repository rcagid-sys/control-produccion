<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grupo Dearnes · Etiquetas PT</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: #F4F3EE; color: #1A1916; }
.panel { background: #1A3A6B; color: #fff; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.panel-title { font-size: 15px; font-weight: 600; }
.panel-sub { font-size: 11px; opacity: .6; margin-top: 2px; }
.panel-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; font-family: inherit; }
.btn-white { background: #fff; color: #1A3A6B; }
.btn-ghost { background: rgba(255,255,255,.15); color: #fff; border: 1px solid rgba(255,255,255,.3); }
.copies-row { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.copies-row input { width: 50px; padding: 6px 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; font-size: 13px; text-align: center; }
.grid { padding: 24px; display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px; }
.card { background: #fff; border: 2px solid #D8D4CC; border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s; position: relative; }
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(26,58,107,.15); }
.card.sel { border-color: #1A3A6B; box-shadow: 0 0 0 3px rgba(26,58,107,.15); }
.card.sel .chk { display: flex; }
.chk { display: none; position: absolute; top: 10px; right: 10px; width: 22px; height: 22px; background: #1A3A6B; color: #fff; border-radius: 50%; font-size: 12px; align-items: center; justify-content: center; font-weight: 700; z-index: 2; }
.card-top { background: linear-gradient(135deg, #1A3A6B, #2D5AA0); padding: 12px 14px; color: #fff; display: flex; justify-content: space-between; align-items: flex-start; }
.card-emp { font-size: 9px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; opacity: .65; }
.card-cod { font-family: monospace; font-size: 20px; font-weight: 600; margin-top: 2px; }
.card-right { text-align: right; }
.card-uni { font-size: 10px; opacity: .55; text-transform: uppercase; letter-spacing: .06em; }
.card-pid { font-size: 10px; opacity: .6; font-family: monospace; margin-top: 2px; }
.card-body { padding: 12px 14px; display: flex; gap: 12px; align-items: center; }
.card-info { flex: 1; }
.card-desc { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 8px; }
.tags { display: flex; gap: 5px; flex-wrap: wrap; }
.tag { padding: 2px 8px; border-radius: 20px; font-size: 10px; font-family: monospace; }
.tag-blue { background: #EEF2FB; color: #1A3A6B; border: 1px solid #c0cef0; }
.tag-gray { background: #F4F3EE; color: #5A5650; border: 1px solid #D8D4CC; }
.qr-box { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.qr-box img { width: 84px; height: 84px; border-radius: 6px; border: 1px solid #D8D4CC; display: block; }
.qr-txt { font-size: 9px; color: #9A968E; font-family: monospace; letter-spacing: .04em; }
.card-foot { background: #F4F3EE; border-top: 1px solid #D8D4CC; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: #5A5650; gap: 8px; }
.lote-row { display: flex; align-items: center; gap: 5px; }
.lote-in { border: 1px solid #D8D4CC; border-radius: 5px; padding: 3px 7px; font-size: 11px; font-family: monospace; color: #1A1916; background: #fff; width: 115px; outline: none; }
.lote-in:focus { border-color: #1A3A6B; }
.fecha { font-family: monospace; white-space: nowrap; }
@media print {
  .panel { display: none !important; }
  .grid { padding: 0; display: block; }
  .card { display: none; page-break-inside: avoid; break-inside: avoid; border: 1px solid #ccc; border-radius: 0; box-shadow: none; margin-bottom: 8px; }
  .card.sel, .card.pcopy { display: block; }
  .chk { display: none !important; }
}
</style>
</head>
<body>
<div class="panel">
  <div>
    <div class="panel-title">🏷️ Grupo Dearnes · Etiquetas Producto Terminado</div>
    <div class="panel-sub">Haz clic en cada etiqueta para seleccionarla</div>
  </div>
  <div class="panel-actions">
    <div class="copies-row">
      <span>Copias:</span>
      <input type="number" id="copies" value="1" min="1" max="20"/>
    </div>
    <button class="btn btn-ghost" id="btn-all" onclick="toggleAll()">☐ Seleccionar todo</button>
    <button class="btn btn-white" onclick="imprimir()">🖨️ Imprimir</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<script>
const productos = [
  { ProdID:'PROD-001', Codigo:'P-10-3.5',    Descripcion:'Rollo 10m2 3.5kg',   Unidad:'rollo'   },
  { ProdID:'PROD-002', Codigo:'P-3-1.1',     Descripcion:'Rollo 3m2 1.1kg',    Unidad:'rollo'   },
  { ProdID:'PROD-003', Codigo:'P-10-3.0',    Descripcion:'Rollo 10m2 3.0kg',   Unidad:'rollo'   },
  { ProdID:'PROD-004', Codigo:'P-05-1.8',    Descripcion:'Rollo 5m2 1.8kg',    Unidad:'rollo'   },
  { ProdID:'PROD-005', Codigo:'P-20-7.2',    Descripcion:'Rollo 20m2 7.2kg',   Unidad:'rollo'   },
  { ProdID:'PROD-006', Codigo:'P-6.5-2.4',   Descripcion:'Rollo 6.5m2 2.4kg',  Unidad:'rollo'   },
  { ProdID:'PROD-007', Codigo:'CU-4.0-L',    Descripcion:'Cubeta 4L Helado',    Unidad:'cubeta'  },
  { ProdID:'PROD-008', Codigo:'CU-4.0-ECOM', Descripcion:'Cubeta 4L ECOM',      Unidad:'cubeta'  },
  { ProdID:'PROD-009', Codigo:'EST-ABG',     Descripcion:'Estuche AGRANDE',    Unidad:'estuche' },
  { ProdID:'PROD-010', Codigo:'EST-ABM',     Descripcion:'Estuche AMEDIANO',   Unidad:'estuche' },
  { ProdID:'PROD-011', Codigo:'EST-IBE',     Descripcion:'Estuche Iberia',     Unidad:'estuche' },
  { ProdID:'PROD-012', Codigo:'BUJE',        Descripcion:'Buje',               Unidad:'pieza'   },
  { ProdID:'PROD-013', Codigo:'BR-16-CAV',   Descripcion:'Broche Sujecion',    Unidad:'pieza'   },
];

const today = () => new Date().toISOString().split('T')[0];
const defaultLote = () => 'L-' + today().replace(/-/g,'');
let allSel = false;

// QR via Google Charts API — muy confiable
function qrUrl(text) {
  return 'https://chart.googleapis.com/chart?cht=qr&chs=84x84&chl=' + encodeURIComponent(text) + '&choe=UTF-8&chld=M|1';
}

function render() {
  const g = document.getElementById('grid');
  g.innerHTML = productos.map((p, i) => `
    <div class="card" id="c${i}" onclick="toggle(${i},event)">
      <div class="chk">✓</div>
      <div class="card-top">
        <div>
          <div class="card-emp">Grupo Dearnes · Prod. Terminado</div>
          <div class="card-cod">${p.Codigo}</div>
        </div>
        <div class="card-right">
          <div class="card-uni">${p.Unidad}</div>
          <div class="card-pid">${p.ProdID}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-info">
          <div class="card-desc">${p.Descripcion}</div>
          <div class="tags">
            <span class="tag tag-blue">${p.ProdID}</span>
            <span class="tag tag-gray">${p.Unidad}</span>
          </div>
        </div>
        <div class="qr-box">
          <img src="${qrUrl(p.ProdID + '|' + p.Codigo)}" alt="QR ${p.Codigo}" width="84" height="84"/>
          <div class="qr-txt">ESCANEAR</div>
        </div>
      </div>
      <div class="card-foot">
        <div class="lote-row">
          <span>Lote:</span>
          <input class="lote-in" id="lote${i}" value="${defaultLote()}"
            onclick="event.stopPropagation()" placeholder="L-20260513"/>
        </div>
        <span class="fecha">${today()}</span>
      </div>
    </div>`).join('');
}

function toggle(i, e) {
  if (e && e.target.tagName === 'INPUT') return;
  document.getElementById('c' + i).classList.toggle('sel');
}

function toggleAll() {
  allSel = !allSel;
  document.querySelectorAll('.card').forEach(c => c.classList.toggle('sel', allSel));
  document.getElementById('btn-all').textContent = allSel ? '☑ Deseleccionar todo' : '☐ Seleccionar todo';
}

function imprimir() {
  const sel = document.querySelectorAll('.card.sel');
  if (!sel.length) { alert('Selecciona al menos una etiqueta.'); return; }
  const copies = parseInt(document.getElementById('copies').value) || 1;
  const g = document.getElementById('grid');
  const clones = [];
  sel.forEach(card => {
    for (let c = 1; c < copies; c++) {
      const cl = card.cloneNode(true);
      cl.classList.remove('sel');
      cl.classList.add('pcopy');
      cl.id = '';
      g.appendChild(cl);
      clones.push(cl);
    }
  });
  window.print();
  setTimeout(() => clones.forEach(c => c.remove()), 1500);
}

render();
</script>
</body>
</html>
